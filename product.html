<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agricom Products</title>
<style>
body {
  font-family: Arial, sans-serif;
  margin: 0;
  background: #f5f5f5;
}
header {
  background: #2e7d32;
  color: white;
  padding: 15px;
  text-align: center;
}
nav {
  display: flex;
  justify-content: center;
  gap: 20px;
  margin: 15px 0;
}
nav button {
  padding: 10px 20px;
  border: none;
  background: #4caf50;
  color: white;
  cursor: pointer;
  border-radius: 5px;
}
.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
  padding: 20px;
}
.card {
  background: white;
  border-radius: 10px;
  padding: 15px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  transition: 0.3s;
}
.card:hover {
  transform: translateY(-5px);
}
.card img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 10px;
}
.price {
  color: #2e7d32;
  font-weight: bold;
}
button.add {
  width: 100%;
  padding: 10px;
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
.modal {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0,0,0,0.5);
  justify-content: center;
  align-items: center;
}
.modal-content {
  background: white;
  padding: 20px;
  border-radius: 10px;
  width: 300px;
  text-align: center;
}
.close {
  float: right;
  cursor: pointer;
  font-size: 20px;
}
</style>
</head>
<body>

<header>
<h1>Agricom Products</h1>
</header>

<nav>
<button onclick="filterProducts('all')">All</button>
<button onclick="filterProducts('seeds')">Seeds</button>
<button onclick="filterProducts('fertilisers')">Fertilisers</button>
<button onclick="filterProducts('tools')">Modern Tools</button>
</nav>

<div class="container" id="productContainer"></div>

<div class="modal" id="productModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h2 id="modalTitle"></h2>
    <p id="modalPrice"></p>
    <p id="modalDesc"></p>
  </div>
</div>

<script>
const products = [
  {name:"Maize Seeds", category:"seeds", price:2000, img:"assets/images/BajiraoMaizeSeed.webp", desc:"High quality maize seeds."},
  {name:"Bean Seeds", category:"seeds", price:1500, img:"assets/images/images (4).jpg", desc:"Fast growing beans."},
  {name:"Organic Fertiliser", category:"fertilisers", price:5000, img:"assets/images/images (3).jpg", desc:"Eco-friendly fertiliser."},
  {name:"NPK Fertiliser", category:"fertilisers", price:7000, img:"assets/images/NPK-Fertilizer-with-Humic-Acid-1.png.webp", desc:"Boosts crop yield."},
  {name:"Irrigation Pump", category:"tools", price:25000, img:"assets/images/images (2).jpg", desc:"Efficient water pump."},
  {name:"Solar Sprayer", category:"tools", price:18000, img:"assets/images/images (1).jpg", desc:"Modern spraying tool."},

  // BIG AGRICULTURAL MACHINES
  {name:"Tractor", category:"tools", price:8500000, img:"assets/images/tractor-john-dere-6m-230.jpg", desc:"Powerful tractor for ploughing and transport."},
  {name:"Combine Harvester", category:"tools", price:15000000, img:"assets/images/Kartar-4000-SV-Regular-Agriculture-Combine-Harvester..jpg", desc:"Efficient machine for harvesting crops."},
  {name:"Plough Machine", category:"tools", price:3200000, img:"assets/images/Green_System_Chisel_Plough_large_7a75139f1171a783058877786a0a619087d17ad1.avif", desc:"Used for preparing soil before planting."},
  {name:"Seed Planter Machine", category:"tools", price:4500000, img:"assets/images/images.jpg", desc:"Automates planting seeds evenly and quickly."}
];

function displayProducts(list) {
  const container = document.getElementById('productContainer');
  container.innerHTML = "";
  list.forEach(p => {
    container.innerHTML += `
      <div class="card" onclick="openModal('${p.name}', ${p.price}, '${p.desc}')">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p class="price">RWF ${p.price}</p>
        <button class="add">Add to Cart</button>
      </div>
    `;
  });
}

function filterProducts(category) {
  if(category === 'all') return displayProducts(products);
  displayProducts(products.filter(p => p.category === category));
}

function openModal(name, price, desc) {
  document.getElementById('modalTitle').innerText = name;
  document.getElementById('modalPrice').innerText = "Price: RWF " + price;
  document.getElementById('modalDesc').innerText = desc;
  document.getElementById('productModal').style.display = "flex";
}

function closeModal() {
  document.getElementById('productModal').style.display = "none";
}

// Load all products initially
displayProducts(products);
</script>

</body>
</html>
